<section class="toast-stack" aria-live="polite" aria-atomic="true">
  <article
    *ngFor="let notification of notificationService.notifications()"
    class="toast"
    [ngClass]="'toast--' + notification.tone"
  >
    <div class="toast__accent"></div>
    <div class="toast__body">
      <p class="toast__title">{{ notification.title }}</p>
      <p class="toast__message">{{ notification.message }}</p>
    </div>
    <button type="button" class="toast__close" (click)="dismiss(notification.id)" aria-label="Dismiss notification">
      ×
    </button>
  </article>
</section>
