<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel = stylesheet href = "./signup.css">
</head>
<body>
    <div class = "container">
        <div class="img">
            <img src="image/logo.png" alt="logo">
        </div>
        <div class = "form">
            <form>
                <h1>Sign Up</h1>
                <label for="fullName" style = "display: block;">Full Name</label>
                <br>
                <input id="fullName" style = "display: block;" type = "text" placeholder="Virat Kohli" name = "fullName" requirred>
                <br>
                <label for="userEmail" style = "display: block;">Email</label>
                <br>
                <input id="userEmail" style = "display: block;" type = "email" placeholder="abc@gmail.com" name = "userEmail" requirred>
                <br>
                <label for="userpassword" style = "display: block;">Password</label>
                <br>
                <input id="userpassword" style = "display: block;" type = "password" placeholder="Password" name = "userPassword" requirred>
                <br>
                <label for="userPhonenumber" style = "display: block;">Phone Number</label>
                <br>
                <input id="userPhonenumber" style = "display: block;" type = "tel" placeholder="+91 1234567890" name = "userPhonenumber" requirred>
                <br>
                <input type="submit" id = "button" style = "display: block;" value = "Sign Up">
            </form>
            <p>Have an account?<a href="LoginForm.html">Sign In</a></p>
        </div>
    </div>
</body>
</html>
