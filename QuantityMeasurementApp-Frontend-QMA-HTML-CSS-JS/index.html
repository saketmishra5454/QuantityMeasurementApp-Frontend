<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantityMeasurementApplication</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel = stylesheet href = "./style.css">
</head>
<body>
    <!--      Navigation Bar       -->
    <nav class="navBar">
        <div class = "logo"><img src="image/logo.png">
            <div class="logoName">Quanment</div>
        </div>
        <div class = "history"><a href="LoginForm.html">History</a></div>
    </nav>

    <!--      Header Component     -->
    <header class = "headerComponent">
        <p>Welcome To Quantity Measurement Application</p>
    </header>


    <!--      Container            -->
    <div class = "container">

       <div class = "childContainer"> 

            <!--    Input Container    -->
            <div class = "inputContainer">

                <!-- Choose Type Text -->
                 <div class = "chooseType">
                    <p>CHOOSE TYPE</p>
                 </div>

                <!--  Type Container   -->
                <div class = "typeContainer">

                    <div class="quantityType lengthSymbol" id = "lengthCard">
                        <div class = "typeImage"><img src = "image/length.png"></div>
                        <div class = "typeText">Length</div>
                    </div>

                    <div class="quantityType temperatureSymbol" id = "temperatureCard">
                        <div class = "typeImage"><img src = "image/thermometer.png"></div>
                        <div class = "typeText">Temperature</div>
                    </div>

                    <div class="quantityType volumeSymbol" id = "volumeCard">
                        <div class = "typeImage"><img src = "image/volume.png"></div>
                        <div class = "typeText">Volume</div>
                    </div>

                    <div class="quantityType weightSymbol" id = "weightCard">
                        <div class = "typeImage"><img src = "image/weightSymbol.svg"></div>
                        <div class = "typeText">Weight</div>
                    </div>
                    



                </div>

                <!--  Operation Container  -->
                <div class = "operationContainer">

                    <div class="opType" id = "addBtn">
                        <img src="image/addition-thick-symbol.png">
                    </div>
                    <div class="opType" id = "subBtn">
                        <img src = "image/minus.png">
                    </div>
                    <div class="opType" id = "divBtn">
                        <img src="image/divide.png">
                    </div>
                    <div class="opType" id = "compareBtn">
                        <!-- <h5>Compare</h5> -->
                        <p>Compare</p>
                    </div>
                    <div class="opType" id = "convertBtn">
                        <p>Convert</p>
                    </div>

                </div>

                <!--  Value Container -->
                <div class = "valueContainer">
                    

                    <div class = "userInputContainer">
                        <div class = "value">
                            <p> FROM </p>
                            <input id = "fromValue" type="number" placeholder="Enter Number">
                        </div>
                        <div class = "unit">
                            <select id="fromUnit">
                                <option>Select Unit</option>
                            </select>
                        </div>
                    </div>
                    <div class = "userInputContainer">
                        <div class = "value">
                            <p> TO </p>
                            <input id = "toValue" type="number" placeholder="Enter Number">
                        </div>
                        <div class = "unit">
                            <select id="toUnit">
                                <option>Select Unit</option>
                            </select>
                        </div>
                    </div>

                </div>

            </div>

        <!-- Get Result Button -->
                <div class="submitButton">
                    <button id = "resultBtn" type = "submit">Result</button>
                </div>

            <!--     Result Container  -->
            <div class = "resultContainer" id = "resultContainer">
                    <p id = "resultText">Result Display Here</p>
            </div>
        </div>
       
    </div>
    <script src="script.js"></script>
</body>
</html>
