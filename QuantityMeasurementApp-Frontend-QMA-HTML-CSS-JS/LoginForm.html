<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel = stylesheet href = "./login.css">
</head>
<body>
    <div class = "container">
        <div class="img">
            <img src="image/logo.png" alt="logo">
        </div>
        <div class = "form">
            <form>
                <h1>Login</h1>
                <label for="fullName" style = "display: block;">Full Name</label>
                <br>
                <input id="fullName" style = "display: block;" type = "text" placeholder="Virat Kohli" name = "fullName" requirred>
                <br>
                <label for="userpassword" style = "display: block;">Password</label>
                <br>
                <input id="userpassword" style = "display: block;" type = "password" placeholder="Password" name = "userPassword" requirred>
                <br>
                <input type="submit" id = "button" style = "display: block;" value = "Sign in">
                <p>Don't have an account?<a href="SignUpForm.html">Sign Up</a></p>
            </form>
            
        </div>
    </div>
</body>
</html>
